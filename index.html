<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>rodrik biersteker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loader">laden…</div>

  <div id="stage"><div id="track"></div></div>

  <div id="frame">
    <div class="bar bar-top"></div>
    <div class="bar bar-bottom"></div>
    <div class="bar bar-left"></div>
    <div class="bar bar-right"></div>
  </div>

  <button id="title" type="button" aria-expanded="false" aria-controls="info-panel" aria-label="toon informatie over dit project"></button>
  <div id="info-panel" role="region" aria-hidden="true">
    <div id="info-panel-inner">
      <div id="info-text"></div>
    </div>
  </div>
  <div id="corner"></div>
  <a id="email" href="mailto:contact@rodrikbiersteker.com">contact@rodrikbiersteker.com</a>

  <script src="config.js"></script>
  <script src="projects.js"></script>
  <script src="app.js"></script>

  <!-- TIJDELIJK — meethulp, alleen zichtbaar op ...html#maat. In zijn geheel weg te halen. -->
  <script>
  if(location.hash === '#maat'){
    const box = document.createElement('div');
    box.style.cssText = 'position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;'
      + 'background:#000;color:#0f0;font:12px/1.5 monospace;padding:12px 16px;border:1px solid #0f0;'
      + 'white-space:pre;text-align:left;pointer-events:none';
    document.body.appendChild(box);
    // Wat de configuratie zegt dat er zou moeten gebeuren.
    let regelsConfig = '';
    const berekenConfig = () => {
      const stage = document.getElementById('stage');
      const w = stage.clientWidth  || innerWidth;
      const h = stage.clientHeight || innerHeight;
      const factor = w <= (CONFIG.mobiel_breakpoint ?? 700) ? (CONFIG.mobiel_snelheidsfactor ?? 1) : 1;
      const speed = (CONFIG.snelheid ?? 34) * factor;
      regelsConfig =
        'venster      ' + innerWidth + ' x ' + innerHeight + '\n' +
        'stage        ' + w + ' x ' + h + '\n' +
        'dpr          ' + devicePixelRatio + '\n' +
        'mobielfactor ' + factor + '\n' +
        'verwacht     ' + speed.toFixed(0) + ' px/s\n';
    };

    // Wat er werkelijk beweegt: we volgen één beeld en meten hoeveel pixels
    // het per seconde opschuift. Recycling van beelden geeft grote sprongen;
    // die gooien we weg.
    let vorigeX = null, somPx = 0, somTijd = 0, frames = 0, vorigeTijd = performance.now();
    let echtePx = 0, fps = 0, breedte = 0;

    const meet = (nu) => {
      const item = document.querySelector('#track .item');
      const dt = (nu - vorigeTijd) / 1000;
      vorigeTijd = nu;
      frames++;
      if(item){
        breedte = item.getBoundingClientRect().width;
        const x = item.getBoundingClientRect().x;
        if(vorigeX !== null && dt > 0){
          const delta = x - vorigeX;
          if(Math.abs(delta) < 60){ somPx += delta; somTijd += dt; }
        }
        vorigeX = x;
      }
      if(somTijd >= 1){
        echtePx = somPx / somTijd;
        fps = frames / somTijd;
        somPx = 0; somTijd = 0; frames = 0;
      }
      const tempo = breedte > 0 ? Math.abs(echtePx) / breedte : 0;
      box.textContent = regelsConfig +
        'gemeten      ' + echtePx.toFixed(1) + ' px/s\n' +
        'fps          ' + fps.toFixed(0) + '\n' +
        'beeldbreedte ' + breedte.toFixed(0) + ' px\n' +
        'tempo        ' + tempo.toFixed(3) + ' beelden/s';
      requestAnimationFrame(meet);
    };

    berekenConfig();
    requestAnimationFrame(meet);
    addEventListener('resize', berekenConfig);
    addEventListener('orientationchange', () => setTimeout(berekenConfig, 300));
  }
  </script>

</body>
</html>
